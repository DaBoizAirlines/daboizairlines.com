<script type="module">
        // 1. IMPORT FIREBASE DIRECTLY FROM GOOGLE'S SERVERS
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 2. PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // 3. INITIALIZE FIREBASE
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const fleetCollection = collection(db, "fleet");

        // --- GLOBAL STATE ---
        let isAdminUnlocked = false;
        let editingRowId = null; 
        let currentClassFilter = 'All';
        let fleetData = []; // We now start empty; Firebase will fill this!

        // --- REAL-TIME DATABASE SYNC ---
        // This listens to Firestore. Anytime ANYONE makes a change, this runs automatically.
        onSnapshot(fleetCollection, (snapshot) => {
            fleetData = [];
            snapshot.forEach((doc) => {
                // We grab the Firebase document ID and merge it with the aircraft data
                fleetData.push({ id: doc.id, ...doc.data() });
            });
            renderFleet();
        });

        // --- ATTACH FUNCTIONS TO WINDOW ---
        // Because we are using a module, we have to manually connect our HTML buttons to our JavaScript
        
        window.revealLogin = function() {
            document.getElementById('secret-trigger').style.display = 'none';
            document.getElementById('login-form').style.display = 'flex';
            document.getElementById('adminPassword').focus();
        };

        window.checkPassword = function() {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === 'dispatch') {
                isAdminUnlocked = true;
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('secret-login-container').style.display = 'none';
                document.getElementById('adminPassword').value = ''; 
                document.getElementById('actionsHeader').style.display = 'table-cell'; 
                renderFleet(); 
            } else {
                alert('Incorrect password. Access denied.');
                document.getElementById('adminPassword').value = '';
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('secret-trigger').style.display = 'block';
            }
        };

        window.lockPanel = function() {
            isAdminUnlocked = false;
            editingRowId = null;
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('secret-login-container').style.display = 'block';
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('secret-trigger').style.display = 'block';
            document.getElementById('actionsHeader').style.display = 'none';
            window.closeAddForm();
            renderFleet();
        };

        document.getElementById("adminPassword").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                window.checkPassword();
            }
        });

        window.setFilter = function(filterValue) {
            currentClassFilter = filterValue;
            editingRowId = null; 
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === filterValue) btn.classList.add('active');
            });
            renderFleet();
        };

        window.renderFleet = function() {
            const tableBody = document.getElementById('fleetTableBody');
            tableBody.innerHTML = ''; 
            
            let planesToDraw = fleetData;
            if (currentClassFilter !== 'All') {
                planesToDraw = fleetData.filter(aircraft => aircraft.class === currentClassFilter);
            }
            
            planesToDraw.forEach(aircraft => {
                const tr = document.createElement('tr');
                
                if (aircraft.id === editingRowId) {
                    tr.innerHTML = `
                        <td>
                            <select id="edit-class-${aircraft.id}" class="inline-input">
                                <option value="C" ${aircraft.class === 'C' ? 'selected' : ''}>C</option>
                                <option value="D" ${aircraft.class === 'D' ? 'selected' : ''}>D</option>
                                <option value="E" ${aircraft.class === 'E' ? 'selected' : ''}>E</option>
                                <option value="F" ${aircraft.class === 'F' ? 'selected' : ''}>F</option>
                            </select>
                        </td>
                        <td><input type="text" id="edit-fin-${aircraft.id}" class="inline-input" value="${aircraft.finNumber}"></td>
                        <td><input type="text" id="edit-reg-${aircraft.id}" class="inline-input" value="${aircraft.registration}"></td>
                        <td><input type="text" id="edit-type-${aircraft.id}" class="inline-input" value="${aircraft.aircraftType}"></td>
                        <td>
                            <select id="edit-status-${aircraft.id}" class="inline-input">
                                <option value="Available" ${aircraft.status === 'Available' ? 'selected' : ''}>Available</option>
                                <option value="Maintenance" ${aircraft.status === 'Maintenance' ? 'selected' : ''}>Maintenance</option>
                            </select>
                        </td>
                        <td>
                            <button class="btn-success action-btn" onclick="saveInlineEdit('${aircraft.id}')">💾 Save</button>
                            <button class="btn-danger action-btn" onclick="cancelInlineEdit()">Cancel</button>
                        </td>
                    `;
                } else {
                    let badgeClass = aircraft.status === 'Available' ? 'status-available' : 'status-maintenance';
                    let rowHTML = `
                        <td><span style="color: #7f8c8d; font-weight: 600; font-size: 1.1em;">${aircraft.class}</span></td>
                        <td><strong>${aircraft.finNumber}</strong></td>
                        <td><strong>${aircraft.registration}</strong></td>
                        <td>${aircraft.aircraftType}</td>
                        <td><span class="badge ${badgeClass}">${aircraft.status}</span></td>
                    `;
                    
                    if (isAdminUnlocked) {
                        rowHTML += `
                            <td>
                                <button class="action-btn" onclick="startInlineEdit('${aircraft.id}')">✏️ Edit</button>
                                <button class="btn-danger action-btn" onclick="deleteAircraft('${aircraft.id}')">🗑️</button>
                            </td>
                        `;
                    }
                    tr.innerHTML = rowHTML;
                }
                tableBody.appendChild(tr);
            });
        };

        window.startInlineEdit = function(id) {
            editingRowId = id;
            renderFleet();
        };

        window.cancelInlineEdit = function() {
            editingRowId = null;
            renderFleet();
        };

        window.openAddForm = function() {
            document.getElementById('addForm').style.display = 'flex';
        };

        window.closeAddForm = function() {
            document.getElementById('addForm').style.display = 'none';
            document.getElementById('addClass').value = '';
            document.getElementById('addFin').value = '';
            document.getElementById('addReg').value = '';
            document.getElementById('addType').value = '';
            document.getElementById('addStatus').value = 'Available';
        };

        // --- FIREBASE DATABASE ACTIONS ---

        window.saveNewAircraft = async function() {
            const newClass = document.getElementById('addClass').value.toUpperCase(); 
            const newFin = document.getElementById('addFin').value;
            const newReg = document.getElementById('addReg').value.toUpperCase(); 
            const newType = document.getElementById('addType').value;
            const newStatus = document.getElementById('addStatus').value;

            if (!newClass || !newFin || !newReg || !newType) {
                alert("Please fill out all the aircraft details.");
                return;
            }

            // Push to Firebase!
            await addDoc(fleetCollection, {
                class: newClass,
                finNumber: newFin,
                registration: newReg,
                aircraftType: newType,
                status: newStatus
            });

            window.closeAddForm();
            // We don't need to call renderFleet() here because onSnapshot will hear the change automatically!
        };

        window.saveInlineEdit = async function(id) {
            const docRef = doc(db, "fleet", id);
            
            // Update existing Firebase document
            await updateDoc(docRef, {
                class: document.getElementById(`edit-class-${id}`).value,
                finNumber: document.getElementById(`edit-fin-${id}`).value,
                registration: document.getElementById(`edit-reg-${id}`).value.toUpperCase(),
                aircraftType: document.getElementById(`edit-type-${id}`).value,
                status: document.getElementById(`edit-status-${id}`).value
            });

            editingRowId = null; 
        };

        window.deleteAircraft = async function(id) {
            if (confirm("Are you sure you want to permanently delete this aircraft?")) {
                const docRef = doc(db, "fleet", id);
                await deleteDoc(docRef); // Delete from Firebase
            }
        };

    </script>
</body>
</html>
